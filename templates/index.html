<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근로계약서 생성기</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>근로계약서 생성기</h1>
    <p class="subtitle">경동TPR 근로계약서 작성 도우미</p>

    <form action="/generate" method="post">

      <!-- 사업주 정보 -->
      <section>
        <h2>■ 계약 당사자 — 사업주</h2>
        <div class="grid-2">
          <div class="field">
            <label>사업주 성명</label>
            <input type="text" name="owner_name" placeholder="홍길동">
          </div>
          <div class="field">
            <label>사업자등록번호</label>
            <input type="text" name="business_reg_no" placeholder="000-00-00000">
          </div>
        </div>
      </section>

      <!-- 근로자 정보 -->
      <section>
        <h2>■ 계약 당사자 — 근로자</h2>
        <div class="grid-2">
          <div class="field">
            <label>근로자 성명</label>
            <input type="text" name="worker_name" placeholder="홍길동">
          </div>
          <div class="field">
            <label>주민등록번호</label>
            <input type="text" name="worker_id_no" placeholder="000000-0000000">
          </div>
          <div class="field">
            <label>근로자 주소</label>
            <input type="text" name="worker_address" placeholder="부산광역시 ...">
          </div>
          <div class="field">
            <label>연락처</label>
            <input type="text" name="worker_phone" placeholder="010-0000-0000">
          </div>
          <div class="field">
            <label>관계</label>
            <input type="text" name="worker_relation" placeholder="예: 자녀">
          </div>
        </div>
      </section>

      <!-- 제1조 -->
      <section>
        <h2>제1조 근무장소 및 업무내용</h2>
        <div class="field">
          <label>담당업무</label>
          <input type="text" name="job_duties" placeholder="고무라벨 생산 등">
        </div>
      </section>

      <!-- 제2조 -->
      <section>
        <h2>제2조 근로계약기간</h2>
        <div class="grid-2">
          <div class="field">
            <label>계약 시작일</label>
            <input type="date" name="contract_start">
          </div>
          <div class="field">
            <label>계약 종료일</label>
            <input type="date" name="contract_end">
          </div>
        </div>
        <div class="field checkbox-field">
          <input type="checkbox" name="no_fixed_term" id="no_fixed_term">
          <label for="no_fixed_term">기간의 정함이 없음 (체크 시 위 날짜는 무시됩니다)</label>
        </div>

        <div class="field">
          <label>수습기간</label>
          <div class="radio-group">
            <label><input type="radio" name="probation" value="none" checked> 없음</label>
            <label><input type="radio" name="probation" value="has"> 있음</label>
          </div>
        </div>
        <div class="grid-2 probation-detail" id="probation-detail" style="display:none">
          <div class="field">
            <label>수습 개월 수</label>
            <input type="text" name="probation_months" placeholder="3">
          </div>
          <div class="field">
            <label>수습 중 임금 (원)</label>
            <input type="text" name="probation_wage" placeholder="2,000,000">
          </div>
        </div>
      </section>

      <!-- 제3조 -->
      <section>
        <h2>제3조 근로시간 및 휴게시간</h2>
        <div class="grid-2">
          <div class="field">
            <label>근로 시작 시간</label>
            <input type="time" name="work_start">
          </div>
          <div class="field">
            <label>근로 종료 시간</label>
            <input type="time" name="work_end">
          </div>
          <div class="field">
            <label>1일 근로시간 (시간)</label>
            <input type="number" name="daily_hours" placeholder="8" min="1" max="24">
          </div>
          <div class="field">
            <label>1주 근로시간 (시간)</label>
            <input type="number" name="weekly_hours" placeholder="40" min="1" max="168">
          </div>
          <div class="field">
            <label>휴게 시작 시간</label>
            <input type="time" name="break_start">
          </div>
          <div class="field">
            <label>휴게 종료 시간</label>
            <input type="time" name="break_end">
          </div>
          <div class="field">
            <label>주 근무일수 (일)</label>
            <input type="number" name="work_days_per_week" placeholder="5" min="1" max="7">
          </div>
          <div class="field">
            <label>주휴일 (요일)</label>
            <input type="text" name="weekly_holiday" placeholder="일">
          </div>
        </div>
      </section>

      <!-- 제4조 -->
      <section>
        <h2>제4조 임금</h2>
        <div class="grid-2">
          <div class="field">
            <label>기본급 (월, 원)</label>
            <input type="text" name="basic_wage" placeholder="2,000,000">
          </div>
          <div class="field">
            <label>시급 (원)</label>
            <input type="text" name="hourly_wage" placeholder="10,030">
          </div>
          <div class="field">
            <label>식대 (원)</label>
            <input type="text" name="meal_allowance" placeholder="100,000">
          </div>
          <div class="field">
            <label>기타 수당 (원)</label>
            <input type="text" name="other_allowance" placeholder="">
          </div>
          <div class="field">
            <label>임금 합계 (월, 원)</label>
            <input type="text" name="total_wage" placeholder="2,100,000">
          </div>
          <div class="field">
            <label>임금 지급일 (매월 몇 일)</label>
            <input type="number" name="pay_day" placeholder="25" min="1" max="31">
          </div>
        </div>
        <div class="field">
          <label>지급 방법</label>
          <div class="radio-group">
            <label><input type="radio" name="pay_method" value="direct" checked> 직접지급</label>
            <label><input type="radio" name="pay_method" value="bank"> 통장입금</label>
          </div>
        </div>
        <div class="grid-2 bank-detail" id="bank-detail" style="display:none">
          <div class="field">
            <label>은행명</label>
            <input type="text" name="bank_name" placeholder="국민은행">
          </div>
          <div class="field">
            <label>계좌번호</label>
            <input type="text" name="account_no" placeholder="000-000-000000">
          </div>
        </div>
      </section>

      <!-- 제6조 -->
      <section>
        <h2>제6조 사회보험</h2>
        <div class="checkbox-group">
          <label><input type="checkbox" name="ins_employment" checked> 고용보험</label>
          <label><input type="checkbox" name="ins_industrial" checked> 산재보험</label>
          <label><input type="checkbox" name="ins_pension" checked> 국민연금</label>
          <label><input type="checkbox" name="ins_health" checked> 건강보험</label>
        </div>
      </section>

      <!-- 제7조 -->
      <section>
        <h2>제7조 기타</h2>
        <div class="field">
          <label>퇴직금</label>
          <div class="radio-group">
            <label><input type="radio" name="severance" value="yes"> 해당</label>
            <label><input type="radio" name="severance" value="no" checked> 미해당</label>
          </div>
        </div>
        <div class="field">
          <label>특약사항</label>
          <textarea name="special_terms" rows="3" placeholder="특약사항이 있는 경우 입력하세요"></textarea>
        </div>
      </section>

      <!-- 계약체결일 -->
      <section>
        <h2>계약체결일</h2>
        <div class="grid-3">
          <div class="field">
            <label>년</label>
            <input type="number" name="contract_year" placeholder="2025" min="2000" max="2100">
          </div>
          <div class="field">
            <label>월</label>
            <input type="number" name="contract_month" placeholder="1" min="1" max="12">
          </div>
          <div class="field">
            <label>일</label>
            <input type="number" name="contract_day" placeholder="1" min="1" max="31">
          </div>
        </div>
      </section>

      <div class="submit-area">
        <button type="submit">근로계약서 생성 (DOCX 다운로드)</button>
      </div>

    </form>
  </div>

  <script>
    // 수습기간 토글
    document.querySelectorAll('[name="probation"]').forEach(el => {
      el.addEventListener('change', () => {
        document.getElementById('probation-detail').style.display =
          el.value === 'has' && el.checked ? 'grid' : 'none';
      });
    });

    // 통장입금 토글
    document.querySelectorAll('[name="pay_method"]').forEach(el => {
      el.addEventListener('change', () => {
        document.getElementById('bank-detail').style.display =
          el.value === 'bank' && el.checked ? 'grid' : 'none';
      });
    });
  </script>
</body>
</html>
